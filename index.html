<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radhe Radhe Counter</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #ffcc70, #ff8177);
        color: white;
    }

    h1 {
        margin-top: 50px;
        font-size: 50px;
    }

    .counter-box {
        margin-top: 40px;
        font-size: 40px;
        font-weight: bold;
    }

    button {
        margin-top: 30px;
        padding: 15px 40px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background-color: white;
        color: #ff4e50;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ffe0b2;
        transform: scale(1.1);
    }
</style>
</head>

<body>

<h1>🌸 Radhe Radhe 🌸</h1>
<img src="radhe.jpg" width="250px" style="margin-top:20px; border-radius:15px;">
<div class="counter-box">
    Radhe Radhe Count: <span id="count">0</span>
</div>

<button onclick="increaseCount()">Radhe Radhe 🙏</button>

<script>
let count = localStorage.getItem("radheCount") || 0;
document.getElementById("count").innerText = count;

function increaseCount() {
    count++;
    document.getElementById("count").innerText = count;
    localStorage.setItem("radheCount", count);
}
</script>

</body>
</html>
